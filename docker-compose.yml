version: "3.9"
services:
  baradb:
    build: .
    ports:
      - "9000:9000"
      - "9470:9470"
      - "9471:9471"
    volumes:
      - baradb_data:/data
    environment:
      - BARADB_PORT=9000
      - BARADB_DATA_DIR=/data
      - BARADB_HTTP_PORT=9470
      - BARADB_WS_PORT=9471
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9470/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  baradb_data:
