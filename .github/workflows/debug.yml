name: Debug Tests

on:
  push:
    branches: [main]

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Nim
        uses: jiro4989/setup-nim-action@v1
        with:
          nim-version: '2.2.10'

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libssl-dev libpcre3-dev openssl ca-certificates

      - name: Install Nim dependencies
        run: nimble install --depsOnly -y

      - name: Check nim binary
        run: |
          which nim
          nim --version
          echo "NIM_OK=1"

      - name: Compile and run minimal test
        run: nim c --threads:on --path:src -r tests/test_minimal.nim > minimal.log 2>&1 || true

      - name: Upload logs to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt-get install -y -qq jq git
          RUN_ID=${{ github.run_id }}
          JOB_ID=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs" | \
            jq '.jobs[] | select(.name=="debug") | .id')
          curl -s -L -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/jobs/$JOB_ID/logs" \
            -o ci_log.txt
          git config user.name "CI Bot"
          git config user.email "ci@baradb"
          git checkout -b ci-logs-$RUN_ID
          cp minimal.log ci_log.txt
          git add ci_log.txt
          git commit -m "CI log for run $RUN_ID" || true
          git push https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.git ci-logs-$RUN_ID || echo "PUSH_FAILED=1"

      - name: Compile test_all
        run: nim c -d:ssl --threads:on --path:src tests/test_all.nim

      - name: Run test_all binary
        run: ./tests/test_all
